{% if exists %}
  <h2>Recommended Books</h2>

  {% for book in recommendations %}
    <a href="/book/{{ book['Book-Title'] }}">
        {{ book['Book-Title'] }}
    </a>

    <p>{{ book['Book-Author'] }}</p>

    <img src="{{ book['Image-URL-L'] }}" 
         alt="{{ book['Book-Title'] }}">
  {% endfor %}

{% else %}
  <h2>You may also like</h2>

        {% for book in fallback_books %}
            <a href="/book/{{ book['Book-Title'] }}">
                {{ book['Book-Title'] }}
            </a>
            <p>{{ book['Book-Author'] }}</p>
            <img src="{{ book['Image-URL-L'] }}">
        {% endfor %}
{% endif %}
